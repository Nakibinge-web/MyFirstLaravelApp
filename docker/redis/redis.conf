# Redis configuration for Laravel Financial Tracker
# Optimized for high-performance cache and session storage

# Network Configuration
bind 0.0.0.0
protected-mode no
port 6379

# Memory Management
# Set maximum memory to 512MB for better performance
maxmemory 512mb

# Eviction policy: Remove least recently used keys when memory limit is reached
# This is ideal for cache usage where old data can be safely removed
maxmemory-policy allkeys-lru

# Performance Optimizations
# Disable persistence for pure cache usage (faster performance)
save ""
appendonly no

# RDB file name (disabled but keeping for reference)
dbfilename dump.rdb

# Directory where RDB snapshots would be saved
dir /data

# Compression (disabled for speed)
rdbcompression no

# Logging
# Log level: debug, verbose, notice, warning
loglevel notice

# Log to stdout (Docker will capture this)
logfile ""

# Performance Tuning
# TCP backlog
tcp-backlog 511

# Close connection after client is idle for N seconds (0 to disable)
timeout 300

# Send TCP keepalives to detect dead connections
tcp-keepalive 60

# Slow log configuration
# Log queries slower than specified microseconds (5000 = 5ms)
slowlog-log-slower-than 5000
slowlog-max-len 128

# Latency monitoring
latency-monitor-threshold 50

# Memory optimization
# Active memory defragmentation (Redis 4.0+)
activedefrag yes
active-defrag-ignore-bytes 100mb
active-defrag-threshold-lower 10
active-defrag-threshold-upper 100
active-defrag-cycle-min 5
active-defrag-cycle-max 75

# Hash optimization
hash-max-ziplist-entries 512
hash-max-ziplist-value 64

# List optimization
list-max-ziplist-size -2
list-compress-depth 0

# Set optimization
set-max-intset-entries 512

# Sorted set optimization
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# HyperLogLog optimization
hll-sparse-max-bytes 3000

# Client output buffer limits
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# Frequency of rehashing the main dictionary
hz 10

# Enable lazy freeing
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
replica-lazy-flush yes

# Jemalloc background thread
jemalloc-bg-thread yes
